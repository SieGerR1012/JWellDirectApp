<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Куст')}"></head>
<body>
<nav th:replace="~{fragments/header :: nav}"></nav>
<div class="container">
  <h1 class="mb-4" th:text="${item.id} ? 'Редактировать куст' : 'Новый куст'">Куст</h1>
  <form th:action="${item.id} ? @{/clusters/{id}/edit(id=${item.id})} : @{/clusters/create}" method="post" class="w-50">
    <div class="mb-3">
      <label class="form-label">Название</label>
      <input type="text" name="name" th:value="${item.name}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a th:href="@{/clusters}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
