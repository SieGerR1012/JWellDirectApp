<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title}">JWellDirect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" th:fragment="nav">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">JWellDirect</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" th:href="@{/wells}">Скважины</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/organisations}">Заказчики</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Исполнители</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/regions}">Регионы</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/subsurface-plots}">Участки недр</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/fields}">Месторождения</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/clusters}">Кусты</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/drilling-crews}">Буровые бригады</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container" th:fragment="content">
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
